# Secret Store CSI provider config — mounts Secret Manager refs as files.
# Apply alongside the Secret Store CSI driver and the GCP provider DaemonSet.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: api-secrets
  namespace: genai-rag
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/REPLACE_ME/secrets/genai-rag-dev-alloydb-password/versions/latest"
        path: "alloydb-password"
        fileName: "alloydb-password"
      - resourceName: "projects/REPLACE_ME/secrets/genai-rag-dev-cohere-api-key/versions/latest"
        path: "cohere-api-key"
        fileName: "cohere-api-key"
  secretObjects:
    - secretName: api-secrets
      type: Opaque
      data:
        - objectName: "alloydb-password"
          key: ALLOYDB_PASSWORD_SECRET
        - objectName: "cohere-api-key"
          key: COHERE_API_KEY
