apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: genai-rag
data:
  GCP_PROJECT_ID: "REPLACE_ME"
  GCP_REGION: "us-central1"
  REDIS_PORT: "6379"
  ALLOYDB_PORT: "5432"
  ALLOYDB_DATABASE: "ragdb"
  ALLOYDB_USER: "postgres"
  EMBEDDING_MODEL: "text-embedding-004"
  ROUTER_MODEL: "gemini-2.5-flash"
  SYNTH_FAST_MODEL: "gemini-2.5-flash"
  SYNTH_QUALITY_MODEL: "claude-3-5-sonnet@20241022"
  RETRIEVAL_TOP_K: "50"
  RERANK_TOP_K: "5"
  CACHE_SIMILARITY_THRESHOLD: "0.92"
  CACHE_TTL_SECONDS: "3600"
  OTEL_EXPORTER: "gcp-trace"
