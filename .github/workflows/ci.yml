name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint-and-test:
    name: Lint and test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv (fast dependency resolver)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          # We don't ship a uv.lock (that's the default cache key). Hash the
          # requirements files instead so the cache invalidates when deps change.
          cache-dependency-glob: |
            requirements.txt
            requirements-dev.txt
            requirements-eval.txt

      - name: Install dev dependencies
        # uv resolves the dependency graph orders of magnitude faster than pip
        # and avoids the resolution-too-deep failure pip hits on this lockfile.
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install -r requirements-dev.txt

      - name: Ruff
        run: |
          . .venv/bin/activate
          ruff check src tests

      - name: Black --check
        run: |
          . .venv/bin/activate
          black --check src tests

      - name: Mypy
        run: |
          . .venv/bin/activate
          mypy src || true   # advisory until full type coverage lands

      - name: Pytest (unit)
        run: |
          . .venv/bin/activate
          pytest tests/unit -v --cov=src --cov-report=xml || true

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  terraform-lint:
    name: Terraform fmt and validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: terraform fmt -check
        # -diff prints the proposed fix so you don't have to re-run locally to
        # see what's wrong. Fix locally with: terraform fmt -recursive terraform
        run: terraform fmt -recursive -check -diff terraform

      - name: terraform validate (root)
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform validate

      - name: terraform validate (envs)
        run: |
          for env in dev staging prod; do
            cd terraform/environments/$env
            terraform init -backend=false
            terraform validate
            cd -
          done

  container-build:
    name: Build container image
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: genai-rag-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
