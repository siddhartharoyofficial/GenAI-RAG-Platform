name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, staging]
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: terraform init
        working-directory: terraform/environments/${{ matrix.env }}
        run: |
          terraform init \
            -backend-config="bucket=tfstate-${{ secrets.GCP_PROJECT_ID }}" \
            -backend-config="prefix=genai-rag/${{ matrix.env }}"

      - name: terraform plan
        working-directory: terraform/environments/${{ matrix.env }}
        run: |
          terraform plan \
            -var "project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -out=tfplan -no-color | tee plan.out

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/${{ matrix.env }}/plan.out', 'utf8');
            const body = `### terraform plan — ${{ matrix.env }}\n\n\`\`\`hcl\n${plan.slice(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
