name: Deploy

on:
  # Only run automatically when explicitly triggered, OR when GCP secrets
  # are configured. This avoids the auth failure that happens when the repo
  # is first cloned without secrets set up.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [dev, staging, prod]
        default: dev
        required: true

permissions:
  id-token: write
  contents: read

env:
  REGION: us-central1

jobs:
  # ----------------------------------------------------------------------------
  # Precheck — confirms the secrets needed for GCP auth are actually set.
  # Without this guard, every job fails at the auth step with a confusing error.
  # ----------------------------------------------------------------------------
  precheck:
    name: Check secrets configured
    runs-on: ubuntu-latest
    outputs:
      gcp_configured: ${{ steps.check.outputs.gcp_configured }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.GCP_WIF_PROVIDER }}" ] && [ -n "${{ secrets.GCP_DEPLOY_SA }}" ] && [ -n "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "gcp_configured=true" >> "$GITHUB_OUTPUT"
            echo "GCP secrets are configured. Proceeding with deploy."
          else
            echo "gcp_configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GCP secrets not configured. Skipping deploy."
            echo "Set these repo secrets to enable: GCP_WIF_PROVIDER, GCP_DEPLOY_SA, GCP_PROJECT_ID."
          fi

  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: [precheck]
    if: needs.precheck.outputs.gcp_configured == 'true'
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - id: image
        name: Compute image tag
        run: echo "image=${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/genai-rag/api:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform-apply:
    name: terraform apply (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: [precheck, build-push]
    if: needs.precheck.outputs.gcp_configured == 'true'
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Apply
        working-directory: terraform/environments/${{ github.event.inputs.environment || 'dev' }}
        run: |
          terraform init \
            -backend-config="bucket=tfstate-${{ secrets.GCP_PROJECT_ID }}" \
            -backend-config="prefix=genai-rag/${{ github.event.inputs.environment || 'dev' }}"
          terraform apply \
            -var "project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var "api_image=${{ needs.build-push.outputs.image }}" \
            -auto-approve

  k8s-deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [precheck, build-push, terraform-apply]
    if: needs.precheck.outputs.gcp_configured == 'true'
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Install kubectl + kustomize
        run: |
          gcloud components install kubectl --quiet
          curl -sSLo /tmp/kustomize.tgz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz
          tar -xzf /tmp/kustomize.tgz -C /usr/local/bin

      - name: Get kubeconfig
        run: |
          gcloud container clusters get-credentials genai-rag-${{ github.event.inputs.environment || 'dev' }}-gke \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Patch image and apply
        run: |
          cd k8s/overlays/${{ github.event.inputs.environment || 'dev' }}
          kustomize edit set image REPLACE_ME_WITH_IMAGE=${{ needs.build-push.outputs.image }}
          kubectl apply -k .
          kubectl -n genai-rag rollout status deploy/${{ github.event.inputs.environment || 'dev' }}-api --timeout=5m
