name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [dev, staging, prod]
        default: dev
        required: true

permissions:
  id-token: write
  contents: read

env:
  REGION: us-central1

jobs:
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - id: image
        name: Compute image tag
        run: echo "image=${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/genai-rag/api:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform-apply:
    name: terraform apply (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: [build-push]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Apply
        working-directory: terraform/environments/${{ github.event.inputs.environment || 'dev' }}
        run: |
          terraform init \
            -backend-config="bucket=tfstate-${{ secrets.GCP_PROJECT_ID }}" \
            -backend-config="prefix=genai-rag/${{ github.event.inputs.environment || 'dev' }}"
          terraform apply \
            -var "project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var "api_image=${{ needs.build-push.outputs.image }}" \
            -auto-approve

  k8s-deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [build-push, terraform-apply]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Get kubeconfig
        run: |
          gcloud container clusters get-credentials genai-rag-${{ github.event.inputs.environment || 'dev' }}-gke \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Patch image and apply
        run: |
          cd k8s/overlays/${{ github.event.inputs.environment || 'dev' }}
          kustomize edit set image REPLACE_ME_WITH_IMAGE=${{ needs.build-push.outputs.image }}
          kubectl apply -k .
          kubectl -n genai-rag rollout status deploy/${{ github.event.inputs.environment || 'dev' }}-api --timeout=5m
